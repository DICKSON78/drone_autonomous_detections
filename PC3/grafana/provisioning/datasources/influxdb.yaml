apiVersion: 1

# InfluxDB Data Source Configuration
# Auto-provisioned InfluxDB datasource for Grafana

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: drone-telemetry
    user: admin
    password: admin123
    isDefault: false
    jsonData:
      version: Flux
      organization: drone-project
      defaultBucket: drone_telemetry
      httpMode: POST
    secureJsonData:
      token: drone-telemetry-token
    editable: true
