[server]
# Protocol (http, https, h2, socket)
protocol = http

# The ip address to bind to, empty will bind to all interfaces
http_addr = 0.0.0.0

# The http port to use
http_port = 3000

# The public facing domain name used to access grafana from a browser
domain = localhost

# Redirect to correct domain if host header does not match domain
# Prevents DNS rebinding attacks
enforce_domain = false

# The full public facing url
root_url = %(protocol)s://%(domain)s:%(http_port)s/

# Serve Grafana from subpath specified in `root_url` setting. By default it is set to `false`.
serve_from_sub_path = false

[security]
# disable creation of admin user on first start of grafana
disable_initial_admin_creation = false

# default admin user, created on startup
admin_user = admin

# default admin password, can be changed before first start of grafana, or configured via env var
admin_password = admin123

# used for signing some data sources like secret keys in data source plugins
secret_key = grafana-secret-key

[database]
# Either "sqlite", "mysql" or "postgres"
type = sqlite3

# For "sqlite3" only, path relative to data_path setting
path = /var/lib/grafana/grafana.db

[log]
# Log level. Could be "debug", "info", "warn", "error", "critical"
level = info

# Log mode. Could be "console", "file", "both"
mode = console, file

[paths]
# Path to where grafana stores sqlite3 database, sessions, provisioning files, etc.
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[analytics]
# Server reporting, sends usage counters to stats.grafana.org every 24 hours.
# No ip addresses are being tracked, only simple counters to track
# running instances, dashboard and error counts. It is very helpful to us.
# Change this option to false to disable reporting.
reporting_enabled = false

[users]
# disable user signup / registration
allow_sign_up = false

# Allow non admin users to create organizations
allow_org_create = false

# Set to true to automatically assign new users to the default organization (id 1)
auto_assign_org = true

# Set to true to automatically assign new users to the default role (Viewer)
auto_assign_org_role = Viewer

# Background text for the user field on the login page
login_hint = email or username

# Default UI theme ("dark" or "light")
default_theme = dark

[auth]
# Login cookie name
login_cookie_name = grafana_session

# The lifetime (days) an authenticated user can be inactive before being required to login at next visit. Default is 7 days.
login_maximum_lifetime_days = 7

# How often should auth tokens be rotated for a user. Default is every 30 days.
token_rotation_interval_minutes = 43200

[auth.anonymous]
# enable anonymous access
enabled = false

# specify organization name that should be used for unauthenticated users
org_name = Main Org.

# specify role for unauthenticated users
org_role = Viewer

[auth.basic]
# enable basic authentication
enabled = true

[smtp]
# Enable with the following boolean to have Grafana try to send emails using the settings below
enabled = false

# Host to connect to
host = localhost:25

# From address for emails
from_address = admin@grafana.localhost

# SMTP user name (if password required)
user =

# SMTP password (if password required)
password =

# SMTP AUTH: PLAIN, LOGIN, CRAM-MD5
auth =

# Skip TLS verification
skip_verify = false

[emails]
# Welcome email on new user sign-up
welcome_email_on_sign_up = false

[log.console]
# Set log level. Could be "debug", "info", "warn", "error", "critical"
level = info

[log.file]
# Set log level. Could be "debug", "info", "warn", "error", "critical"
level = info

# Log line format, valid options are text, console and json
format = text

# Set log lines to be appended to this file instead of stdout
log_rotate = true

# Max lines in a single file
max_lines = 1000000

# Max size of a single file in bytes
max_size_shift = 28

# Compress rotated log files
compress = true

[dashboards.json]
# Path to the default home dashboard. If this value is empty, then Grafana uses StaticRootPath/dashboards/home.json
path = /var/lib/grafana/dashboards

[dashboards]
# Directory where Grafana will automatically look for existing dashboards
path = /var/lib/grafana/dashboards

[plugins]
# Enable or disable installing / uninstalling / updating plugins directly from Grafana UI
allow_loading_unsigned_plugins = true

# Enable or disable the usage of Grafana enterprise plugins
enterprise_plugins_path =

[external_image_storage]
# Used for having Grafana store images on a local disk rather than in database
provider =

[plugin.grafana-image-renderer]
# Configures rendering service for Grafana
rendering_callback_url =

[external_rendering]
# Configures remote rendering service
callback_url =

[grafana_net]
# Configures grafana.net alerts and live collaboration
url =

[feature_toggles]
# enable some features and hide others
enable =

[date_formats]
# For backwards compatibility date formats can be defined in a few different ways
# This section shows all the ways and the resulting format
# For backwards compatibility these date formats can be defined in a few different ways
# This section shows all the ways and the resulting format

# Example formats:
# ; date format: 2006-01-02
# ; interval format: 2006-01-02 15:04:05
# ; full date format: 2006-01-02 15:04:05 MST
# ; log format: 2006-01-02 15:04:05 MST

# Default value for date format
default_timezone = UTC
default_date_format = 2006-01-02
default_interval_format = 2006-01-02 15:04:05
default_full_date_format = 2006-01-02 15:04:05 MST
default_log_format = 2006-01-02 15:04:05 MST

# Example format for seconds since epoch
# ; seconds_format: 2006-01-02 15:04:05
# ; seconds_with_interval_format: 2006-01-02 15:04:05

# Example format for milliseconds since epoch
# ; milliseconds_format: 2006-01-02 15:04:05
# ; milliseconds_with_interval_format: 2006-01-02 15:04:05

# Example format for microseconds since epoch
# ; microseconds_format: 2006-01-02 15:04:05
# ; microseconds_with_interval_format: 2006-01-02 15:04:05

# Example format for Unix timestamp
# ; unix_timestamp_format: 2006-01-02 15:04:05
# ; unix_timestamp_with_interval_format: 2006-01-02 15:04:05

# Example format for Unix timestamp with nanoseconds
# ; unix_timestamp_ns_format: 2006-01-02 15:04:05
# ; unix_timestamp_ns_with_interval_format: 2006-01-02 15:04:05

# Example format for Unix timestamp with microseconds
# ; unix_timestamp_us_format: 2006-01-02 15:04:05
# ; unix_timestamp_us_with_interval_format: 2006-01-02 15:04:05

# Example format for RFC3339
# ; rfc3339_format: 2006-01-02T15:04:05Z07:00
# ; rfc3339_with_interval_format: 2006-01-02T15:04:05Z07:00

# Example format for RFC3339 Nano
# ; rfc3339_nano_format: 2006-01-02T15:04:05.000000000Z07:00
# ; rfc3339_nano_with_interval_format: 2006-01-02T15:04:05.000000000Z07:00

# Example format for RFC3339 Micro
# ; rfc3339_micro_format: 2006-01-02T15:04:05.000000Z07:00
# ; rfc3339_micro_with_interval_format: 2006-01-02T15:04:05.000000Z07:00

# Example format for RFC822
# ; rfc822_format: 02 Jan 06 15:04 MST
# ; rfc822_with_interval_format: 02 Jan 06 15:04 MST

# Example format for RFC822 with timezone
# ; rfc822_with_tz_format: 02 Jan 06 15:04 MST

# Example format for RFC1123
# ; rfc1123_format: Mon, 02 Jan 2006 15:04:05 MST
# ; rfc1123_with_interval_format: Mon, 02 Jan 2006 15:04:05 MST

# Example format for RFC3339 Seconds
# ; rfc3339_seconds_format: 2006-01-02T15:04:05Z07:00
# ; rfc3339_seconds_with_interval_format: 2006-01-02T15:04:05Z07:00

# Example format for RFC3339 Nano
# ; rfc3339_nano_format: 2006-01-02T15:04:05.000000000Z07:00
# ; rfc3339_nano_with_interval_format: 2006-01-02T15:04:05.000000000Z07:00

# Example format for RFC3339 Micro
# ; rfc3339_micro_format: 2006-01-02T15:04:05.000000Z07:00
# ; rfc3339_micro_with_interval_format: 2006-01-02T15:04:05.000000Z07:00

# Example format for RFC3339 Seconds
# ; rfc3339_seconds_format: 2006-01-02T15:04:05Z07:00
# ; rfc3339_seconds_with_interval_format: 2006-01-02T15:04:05Z07:00

# Example format for RFC3339 Nano
# ; rfc3339_nano_format: 2006-01-02T15:04:05.000000000Z07:00
# ; rfc3339_nano_with_interval_format: 2006-01-02T15:04:05.000000000Z07:00

# Example format for RFC3339 Micro
# ; rfc3339_micro_format: 2006-01-02T15:04:05.000000Z07:00
# ; rfc3339_micro_with_interval_format: 2006-01-02T15:04:05.000000Z07:00

# Example format for RFC3339 Seconds
# ; rfc3339_seconds_format: 2006-01-02T15:04:05Z07:00
# ; rfc3339_seconds_with_interval_format: 2006-01-02T15:04:05Z07:00

# Example format for RFC3339 Nano
