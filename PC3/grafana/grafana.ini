[server]
protocol = http
http_port = 3000

[security]
admin_user = admin
admin_password = admin123
allow_embedding = true

[auth.anonymous]
enabled = false

[auth]
disable_login_form = false

[users]
allow_sign_up = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/drone-telemetry.json

[log]
mode = console
level = info
