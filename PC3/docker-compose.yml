version: '3.8'

services:
  # Grafana Service
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      # - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - fyp-network
    restart: unless-stopped

  # Node Exporter - system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - fyp-network
    restart: unless-stopped

  # InfluxDB - time-series database for telemetry storage
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=drone-project
      - DOCKER_INFLUXDB_INIT_BUCKET=drone_telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=drone-telemetry-token
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb:/docker-entrypoint-initdb.d
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telemetry Collector - bridges MAVLink/Kafka to InfluxDB + Prometheus
  telemetry-collector:
    build: ./src/telemetry-collector
    container_name: telemetry-collector
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=drone-telemetry-token
      - INFLUXDB_ORG=drone-project
      - INFLUXDB_BUCKET=drone_telemetry
      - MAVLINK_HOST=gazebo-px4
      - MAVLINK_PORT=14550
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # API Gateway - Express bridge for Kafka ↔ Grafana ↔ Web
  api-gateway:
    build: ./src/api-gateway
    container_name: api-gateway
    ports:
      - "8008:8008"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=drone-telemetry-token
      - INFLUXDB_ORG=drone-project
      - INFLUXDB_BUCKET=drone_telemetry
      - PORT=8008
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  grafana_data:
  prometheus_data:
  influxdb_data:

networks:
  fyp-network:
    name: fyp-network
    external: true
