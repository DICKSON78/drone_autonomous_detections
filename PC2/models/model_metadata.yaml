# Model Metadata
# Information about AI models used in the drone system

models:
  # Object Detection Model
  object_detection:
    name: "YOLOv8n"
    version: "1.0.0"
    description: "Lightweight object detection model for real-time drone vision"
    
    # Model Files
    weights_file: "yolov8n.pt"
    config_file: null  # YOLOv8 doesn't use separate config
    
    # Performance Metrics
    performance:
      mAP@0.5: 0.374
      mAP@0.5:0.95: 0.280
      inference_time_ms: 15.2  # on RTX 3080
      model_size_mb: 6.2
      fps: 65.7
      
    # Training Information
    training:
      dataset: "COCO 2017"
      training_epochs: 300
      input_size: [640, 640]
      batch_size: 16
      learning_rate: 0.01
      optimizer: "SGD"
      
    # Classes
    classes:
      - "person"
      - "bicycle"
      - "car"
      - "motorcycle"
      - "airplane"
      - "bus"
      - "train"
      - "truck"
      - "boat"
      - "traffic light"
      - "fire hydrant"
      - "stop sign"
      - "parking meter"
      - "bench"
      - "bird"
      - "cat"
      - "dog"
      - "horse"
      - "sheep"
      - "cow"
      - "elephant"
      - "bear"
      - "zebra"
      - "giraffe"
      - "backpack"
      - "umbrella"
      - "handbag"
      - "tie"
      - "suitcase"
      - "frisbee"
      - "skis"
      - "snowboard"
      - "sports ball"
      - "kite"
      - "baseball bat"
      - "baseball glove"
      - "skateboard"
      - "surfboard"
      - "tennis racket"
      - "bottle"
      - "wine glass"
      - "cup"
      - "fork"
      - "knife"
      - "spoon"
      - "bowl"
      - "banana"
      - "apple"
      - "sandwich"
      - "orange"
      - "broccoli"
      - "carrot"
      - "hot dog"
      - "pizza"
      - "donut"
      - "cake"
      - "chair"
      - "couch"
      - "potted plant"
      - "bed"
      - "dining table"
      - "toilet"
      - "tv"
      - "laptop"
      - "mouse"
      - "remote"
      - "keyboard"
      - "cell phone"
      - "microwave"
      - "oven"
      - "toaster"
      - "sink"
      - "refrigerator"
      - "book"
      - "clock"
      - "vase"
      - "scissors"
      - "teddy bear"
      - "hair drier"
      - "toothbrush"
    
    # Drone-Specific Information
    drone_integration:
      target_classes: ["person", "car", "truck", "dog", "cat", "horse", "cow", "sheep", "bird", "tree", "building"]
      confidence_threshold: 0.5
      nms_threshold: 0.45
      
    # Hardware Requirements
    requirements:
      min_gpu_memory_gb: 4
      recommended_gpu_memory_gb: 8
      cpu_cores: 4
      ram_gb: 8
      
  # Reinforcement Learning Model
  rl_navigation:
    name: "Drone Navigation DQN"
    version: "1.0.0"
    description: "Deep Q-Network for autonomous drone navigation"
    
    # Model Files
    weights_file: "drone_navigation_dqn.pth"
    checkpoint_dir: "checkpoints/"
    
    # Performance Metrics
    performance:
      success_rate: 0.85
      average_episode_reward: 75.3
      average_episode_length: 245
      convergence_episode: 3500
      training_time_hours: 12
      
    # Training Information
    training:
      algorithm: "DQN"
      environment: "DroneNavigationEnv"
      total_episodes: 10000
      max_steps_per_episode: 1000
      batch_size: 32
      learning_rate: 0.001
      gamma: 0.99
      epsilon_decay: 0.995
      
    # Network Architecture
    architecture:
      input_dim: 14
      hidden_layers: [256, 128, 64]
      output_dim: 6
      activation: "ReLU"
      optimizer: "Adam"
      loss_function: "MSE"
      
    # State Space
    state_space:
      features:
        - "drone_x"
        - "drone_y"
        - "target_x"
        - "target_y"
        - "obstacle_distances_1"
        - "obstacle_distances_2"
        - "obstacle_distances_3"
        - "obstacle_distances_4"
        - "obstacle_distances_5"
        - "altitude"
        - "velocity_x"
        - "velocity_y"
        - "heading"
        - "battery_percentage"
        
    # Action Space
    action_space:
      actions:
        - "up"        # Move forward (increase Y)
        - "down"      # Move backward (decrease Y)
        - "left"      # Move left (decrease X)
        - "right"     # Move right (increase X)
        - "hover"     # Stay in place
        - "emergency"  # Emergency stop
        
    # Reward Function
    reward_function:
      target_reached: 100.0
      step_penalty: -0.1
      obstacle_collision: -50.0
      out_of_bounds: -25.0
      distance_penalty: -0.01
      
    # Hardware Requirements
    requirements:
      min_gpu_memory_gb: 2
      recommended_gpu_memory_gb: 4
      cpu_cores: 2
      ram_gb: 4

# System Information
system:
  # Version Control
  version: "1.0.0"
  last_updated: "2024-01-01"
  
  # Compatibility
  compatible_drone_models:
    - "PX4 Quadcopter"
    - "ArduCopter"
    - "DJI Matrice"
    
  # Deployment
  deployment_environment: "Docker Container"
  python_version: "3.10+"
  node_version: "18+"
  
  # Model Management
  model_registry:
    url: "http://internal-registry:8080"
    backup_location: "/app/models/backup/"
    
# Performance Benchmarks
benchmarks:
  # Object Detection
  detection_benchmarks:
    input_sizes:
      "320x320": { fps: 120, memory_mb: 2.1 }
      "640x640": { fps: 65, memory_mb: 6.2 }
      "1280x1280": { fps: 15, memory_mb: 24.8 }
      
  # RL Navigation
  rl_benchmarks:
    inference_time_ms: 0.5
    memory_usage_mb: 12.5
    cpu_usage_percent: 15
    
# Quality Assurance
quality:
  # Testing Coverage
  test_coverage: 0.85
  
  # Validation Results
  validation:
    object_detection_map: 0.374
    rl_success_rate: 0.85
    integration_tests_passed: true
    
  # Model Monitoring
  monitoring:
    drift_detection: true
    performance_alerts: true
    automatic_retraining: false
