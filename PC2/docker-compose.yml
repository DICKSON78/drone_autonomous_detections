
services:

  # Gazebo + PX4 SITL Simulation
  gazebo-px4:
    image: px4io/px4-sitl-gazebo:latest
    container_name: gazebo-px4
    # Use host network for easier X11 and MAVLink connectivity if needed, 
    # but keeping fyp-network for consistency with the rest of the system.
    ports:
      # Host port -> Container port (PX4 internal ports from mavlink channels)
      # PX4 Normal/GCS channel: listens on 18570, expects remote on 14550
      # PX4 Onboard channel: listens on 14580, expects remote on 14540
      - "14550:18570/udp"   # GCS commands: host:14550 -> container:18570
      - "14540:14580/udp"   # Onboard telemetry: host:14540 -> container:14580
      - "14556:14556/udp"

    environment:
      # Select Gazebo simulator: gz (Harmonic) vs gazebo-classic
      - PX4_SIMULATOR=gz
      # Gazebo Harmonic world selection (world file name without .sdf)
      - PX4_GZ_WORLD=dodoma_tanzania
      # Drone model (PX4 auto-spawns this into the world)
      - PX4_SIM_MODEL=gz_x500
      # Gazebo Harmonic model/resource paths
      - GZ_SIM_RESOURCE_PATH=/gazebo_models/dodoma:/opt/px4-gazebo/share/gz/models:/opt/px4-gazebo/share/gz/worlds
      # GPS origin - Dodoma, Tanzania (elevation ~1120m)
      - PX4_HOME_LAT=-6.1630
      - PX4_HOME_LON=35.7516
      - PX4_HOME_ALT=1120
      # X11 display forwarding
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      # Set HEADLESS=1 for no GUI, remove/comment for X11 GUI
      - HEADLESS=1
      # Pre-set parameters for SITL (no GPS = must arm w/o GPS)
      - PX4_PARAM_COM_ARM_WO_GPS=1
      # Disable GCS failsafe so drone doesn't auto-descend when GCS heartbeat is missed
      - PX4_PARAM_FS_GCS_ENABLE=0
      # Disable arming checks for easier debugging
      - PX4_PARAM_ARMING_CHECK=0
    volumes:
      - ./px4_config:/px4_config
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ./gazebo_worlds:/gazebo_worlds:ro
      - ./gazebo_models:/gazebo_models:ro
      # Mount world into PX4's standard world directory so PX4 finds it
      - ./gazebo_worlds/dodoma/dodoma_tanzania.sdf:/opt/px4-gazebo/share/gz/worlds/dodoma_tanzania.sdf
    networks:
      - fyp-network
    restart: unless-stopped
    mem_limit: 3g
    memswap_limit: 4g
    # Add GPU support if available (requires nvidia-docker2)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]


  # Object Detection Service (YOLOv8)
  object-detection:
    build: ./src/object-detection
    container_name: object-detection
    ports:
      - "8002:8002"
    depends_on:
      - kafka-bridge
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RL Navigation Service
  rl-navigation:
    build: ./src/rl-navigation
    container_name: rl-navigation
    ports:
      - "8003:8003"
    depends_on:
      - kafka-bridge
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# Kafka Bridge
  kafka-bridge:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-bridge
    command: |
      sh -c "
      echo 'client.id=bridge-client
      bootstrap.servers=kafka:9092' > /tmp/bridge.properties &&
      kafka-topics --bootstrap-server kafka:9092 --list &&
      tail -f /dev/null
      "
    networks:
      - fyp-network

networks:
  fyp-network:
    name: fyp-network
    external: true