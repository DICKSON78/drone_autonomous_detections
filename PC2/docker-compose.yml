version: '3.8'

services:

  # Gazebo + PX4 SITL Simulation
  gazebo-px4:
    image: px4io/px4-sitl-gazebo:latest
    container_name: gazebo-px4

    ports:
      - "14540:14540/udp"
      - "14556:14556/udp"

    environment:
      - PX4_SIM_HOST=gazebo-px4
      - PX4_SIM_PORT=14540
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - ./px4_config:/px4_config
      - /tmp/.X11-unix:/tmp/.X11-unix

    network_mode: host
    restart: unless-stopped

  # Object Detection Service (YOLOv8)
  object-detection:
    build: ./src/object-detection
    container_name: object-detection
    ports:
      - "8002:8002"
    depends_on:
      - kafka-bridge
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RL Navigation Service
  rl-navigation:
    build: ./src/rl-navigation
    container_name: rl-navigation
    ports:
      - "8003:8003"
    depends_on:
      - kafka-bridge
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka Bridge
  kafka-bridge:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-bridge
    command: |
      sh -c "
      echo 'client.id=bridge-client
      bootstrap.servers=kafka:9092' > /tmp/bridge.properties &&
      kafka-topics --bootstrap-server kafka:9092 --list &&
      tail -f /dev/null
      "
    networks:
      - fyp-network

networks:
  fyp-network:
    name: fyp-network
    external: true