version: '3.8'

services:
  # Feedback Service (TTS) - Main service for PC4
  feedback-service:
    build:
      context: ./src/feedback-service
    container_name: feedback-service
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=PC1:9092
      - TTS_RATE=150
      - TTS_VOLUME=1.0
      - TTS_VOICE_INDEX=0
      - PORT=8005
    # Add host device for audio output
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - drone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  drone-network:
    driver: bridge