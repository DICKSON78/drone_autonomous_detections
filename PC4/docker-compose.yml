version: '3.8'

services:
  # Feedback Service (TTS) - Main service for PC4
  feedback-service:
    build: ./microservices/feedback_service
    container_name: feedback-service
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    # Add host device for audio output
    devices:
      - /dev/snd:/dev/snd
    networks:
      - fyp-network
    restart: unless-stopped

networks:
  fyp-network:
    name: fyp-network
    external: true
