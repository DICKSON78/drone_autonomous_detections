
services:
  # Kafka Message Broker
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fyp-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Internal + external listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fyp-network

  # Kafka UI - Web dashboard for monitoring topics, consumers, and brokers
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: LGADS-Cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    networks:
      - fyp-network
    restart: unless-stopped

  # Zookeeper Web UI - Browse Zookeeper znodes directly (proves service registration)
  zookeeper-webui:
    image: elkozmon/zoonavigator-web:latest
    container_name: zookeeper-webui
    ports:
      - "9000:9000"
    environment:
      API_HOST: "zookeeper-navigator-api"
      API_PORT: "9001"
      AUTOCONNECT_CONNECTIONS: '[{"name":"LGADS-Zookeeper","connectionString":"zookeeper:2181"}]'
    depends_on:
      - zookeeper
      - zookeeper-navigator-api
    networks:
      - fyp-network
    restart: unless-stopped

  zookeeper-navigator-api:
    image: elkozmon/zoonavigator-api:latest
    container_name: zookeeper-navigator-api
    ports:
      - "9001:9001"
    environment:
      ZOOKEEPER_CONNECTION_STRING: "zookeeper:2181"
    depends_on:
      - zookeeper
    networks:
      - fyp-network
    restart: unless-stopped

  # Command Parser Service (Node.js)
  command-parser:
    build: ./src/command-parser
    container_name: command-parser
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      - PC1_IP=${PC1_IP}
      - PC2_IP=${PC2_IP}
      - PC3_IP=${PC3_IP}
      - PC4_IP=${PC4_IP}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PORT=8000
    volumes:
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Flight Control Service (Node.js)
  flight-control:
    build: ./src/flight-control
    container_name: flight-control
    ports:
      - "8001:8001"
      - "8081:8081"
    depends_on:
      - kafka
    environment:
      - PC1_IP=${PC1_IP}
      - PC2_IP=${PC2_IP}
      - PC3_IP=${PC3_IP}
      - PC4_IP=${PC4_IP}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PORT=8001
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - fyp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  fyp-network:
    name: fyp-network
    external: true